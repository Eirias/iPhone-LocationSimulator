name: LocationSimulator
options:
  bundleIdPrefix: com.locationsimulator
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

packages:
  AppStore:
    path: Packages/State/AppStore
  SpooferService:
    path: Packages/Other/Services/SpooferService
  SidebarFeature:
    path: Packages/Features/SidebarFeature
  MapFeature:
    path: Packages/Features/MapFeature
  DesignSystem:
    path: Packages/Other/DesignSystem
  Localization:
    path: Packages/Other/Localization

targets:
  LocationSimulator:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
        optional: true
    dependencies:
      - package: AppStore
        product: AppStore
      - package: SpooferService
        product: SpooferService
      - package: SidebarFeature
        product: SidebarFeature
      - package: MapFeature
        product: MapFeature
      - package: DesignSystem
        product: DesignSystem
      - package: Localization
        product: Localization
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Location Simulator
        LSApplicationCategoryType: public.app-category.developer-tools
        NSLocationWhenInUseUsageDescription: Used to spoof the connected device to your Mac's current location.
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eirias.locationsimulator
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
